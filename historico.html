<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Histórico de Evoluções</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1557a0;
      --blue-light: #e8f1fb;
      --blue-mid: #2d7dd6;
      --green: #0f6b3c;
      --green-light: #e4f5ec;
      --red: #b91c1c;
      --red-light: #fef2f2;
      --amber: #92400e;
      --amber-light: #fffbeb;
      --border: #d1d5db;
      --bg: #f4f6fa;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --radius: 14px;
      --radius-sm: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.6;
      padding: 0;
    }

    /* ── Topo ── */
    .topbar {
      background: var(--blue);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .topbar-title { color: #fff; font-size: 19px; font-weight: 600; line-height: 1.2; }
    .topbar-sub   { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 2px; }

    .topbar-actions {
      display: flex;
      gap: 10px;
    }

    .btn-link {
      padding: 10px 16px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.18s;
      min-height: 40px;
    }
    .btn-link:hover { background: rgba(255,255,255,0.3); }
    .btn-link:active { background: rgba(255,255,255,0.4); }

    /* ── Container ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── Filtros ── */
    .filters-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .filters-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 640px) {
      .filters-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 900px) {
      .filters-grid { grid-template-columns: 2fr 1fr 1fr; }
    }

    .filter-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-field label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .filter-field input,
    .filter-field select {
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      background: #fafafa;
      transition: border-color 0.18s;
    }
    .filter-field input:focus,
    .filter-field select:focus {
      outline: none;
      border-color: var(--blue);
      background: #fff;
    }

    .filter-buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-filter {
      flex: 1;
      padding: 11px 16px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
      min-height: 44px;
    }
    .btn-filter:active { background: #0e3f7a; }

    .btn-limpar {
      flex: 1;
      padding: 11px 16px;
      background: var(--blue-light);
      color: var(--blue);
      border: 1.5px solid var(--blue-mid);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
      min-height: 44px;
    }
    .btn-limpar:active { background: #d0e4f8; }

    /* ── Resultados ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .results-count {
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
    }

    .view-toggle {
      display: flex;
      gap: 6px;
    }

    .view-btn {
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .view-btn.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    /* ── Timeline ── */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .timeline-item {
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: box-shadow 0.18s;
    }
    .timeline-item:hover {
      box-shadow: 0 4px 12px rgba(21, 87, 160, 0.08);
    }

    .timeline-header {
      padding: 16px;
      background: var(--blue-light);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .timeline-meta {
      flex: 1;
    }

    .timeline-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .timeline-paciente {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .timeline-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--green-light);
      color: var(--green);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .timeline-body {
      padding: 16px;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    @media (min-width: 640px) {
      .timeline-row { grid-template-columns: 1fr 1fr; }
    }
    .timeline-row:last-child { margin-bottom: 0; }

    .timeline-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .timeline-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .timeline-value {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
    }

    .timeline-footer {
      padding: 12px 16px;
      background: #f9fafb;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn-view-pdf {
      padding: 10px 16px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.18s;
    }
    .btn-view-pdf:hover { background: #0e3f7a; }

    .btn-view-pdf:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }

    /* ── Atalhos (Primeira/Última) ── */
    .shortcuts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .shortcut-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      padding: 16px;
      text-align: center;
      transition: all 0.18s;
      cursor: pointer;
    }
    .shortcut-card:hover {
      box-shadow: 0 4px 12px rgba(21, 87, 160, 0.08);
      border-color: var(--blue);
    }

    .shortcut-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .shortcut-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .shortcut-date {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .btn-shortcut {
      width: 100%;
      padding: 10px;
      background: var(--blue-light);
      color: var(--blue);
      border: 1.5px solid var(--blue-mid);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-shortcut:active { background: #d0e4f8; }
    .btn-shortcut:disabled {
      background: #f3f4f6;
      color: var(--muted);
      border-color: var(--border);
      cursor: not-allowed;
    }

    /* ── Estado vazio ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-text {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .btn-novo {
      padding: 12px 24px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Feedback ── */
    .feedback {
      padding: 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      display: none;
    }
    .feedback.show { display: block; }

    .feedback.success {
      background: var(--green-light);
      color: var(--green);
      border: 1px solid var(--green);
    }

    .feedback.error {
      background: var(--red-light);
      color: var(--red);
      border: 1px solid var(--red);
    }

    .feedback.info {
      background: var(--blue-light);
      color: var(--blue);
      border: 1px solid var(--blue);
    }

    @media (max-width: 640px) {
      .container { padding: 14px 10px; }
      .filters-grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; text-align: center; }
      .topbar-actions { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Topo -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">📋</div>
      <div>
        <div class="topbar-title">Histórico de Evoluções</div>
        <div class="topbar-sub">Consulte todas as evoluções de enfermagem</div>
      </div>
    </div>
    <div class="topbar-actions">
      <a href="index.html" class="btn-link">➕ Nova Evolução</a>
    </div>
  </div>

  <!-- Container Principal -->
  <div class="container">

    <!-- Feedback -->
    <div id="feedback" class="feedback"></div>

    <!-- Filtros -->
    <div class="filters-section">
      <div class="filters-title">🔍 Filtros</div>
      <div class="filters-grid">
        <div class="filter-field">
          <label for="filter-paciente">Paciente</label>
          <input type="text" id="filter-paciente" placeholder="Nome do paciente...">
        </div>
        <div class="filter-field">
          <label for="filter-coren">COREN</label>
          <input type="text" id="filter-coren" placeholder="Ex: 12345-SP">
        </div>
        <div class="filter-field">
          <label for="filter-data">Data inicial</label>
          <input type="date" id="filter-data">
        </div>
      </div>
      <div class="filter-buttons">
        <button class="btn-filter" onclick="aplicarFiltros()">🔎 Filtrar</button>
        <button class="btn-limpar" onclick="limparFiltros()">⟲ Limpar</button>
      </div>
    </div>

    <!-- Atalhos (Primeira/Última) -->
    <div id="shortcuts-section" style="display: none;">
      <div class="shortcuts">
        <div class="shortcut-card" onclick="ir_primeira()">
          <div class="shortcut-icon">⏮️</div>
          <div class="shortcut-label">Primeira Evolução</div>
          <div class="shortcut-date" id="primeira-data">-</div>
          <button class="btn-shortcut" id="btn-primeira">Ver</button>
        </div>
        <div class="shortcut-card" onclick="ir_ultima()">
          <div class="shortcut-icon">⏭️</div>
          <div class="shortcut-label">Última Evolução</div>
          <div class="shortcut-date" id="ultima-data">-</div>
          <button class="btn-shortcut" id="btn-ultima">Ver</button>
        </div>
      </div>
    </div>

    <!-- Header de resultados -->
    <div id="results-header" style="display: none;" class="results-header">
      <div class="results-count">
        <span id="total-evolutions">0</span> evolução(ões)
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>Carregando evoluções...</p>
    </div>

    <!-- Timeline -->
    <div id="timeline" class="timeline"></div>

    <!-- Estado vazio -->
    <div id="empty-state" class="empty-state" style="display: none;">
      <div class="empty-icon">📭</div>
      <h2 class="empty-title">Nenhuma evolução encontrada</h2>
      <p class="empty-text">Comece registrando uma nova evolução de enfermagem</p>
      <a href="index.html" class="btn-novo">➕ Nova Evolução</a>
    </div>

  </div>

  <script>
    // ── Configuração ──────────────────────────────────────────────────
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwuwiRYwPLono0BvRynQy53AKlhLoQtzNUlSi8KSOuc-TFFwp9uY2iblK27Z9iOENjy/exec';

    // ── Dados ─────────────────────────────────────────────────────────
    let todasEvolucoes = [];
    let evolucoesFiltradas = [];
    let pacienteSelecionado = null;

    // ── Utilitários HTTP ──────────────────────────────────────────────
    async function chamarBackend(payload) {
      try {
        const res = await fetch(BACKEND_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      } catch (err) {
        mostrarFeedback('error', '⚠️ Erro de conexão: ' + err.message);
        throw err;
      }
    }

    // ── Carregamento inicial ──────────────────────────────────────────
    async function carregarEvolucoes() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('timeline').innerHTML = '';
      document.getElementById('empty-state').style.display = 'none';

      try {
        const res = await chamarBackend({ action: 'listarEvolucoes' });
        if (res.sucesso) {
          todasEvolucoes = res.evolucoes || [];
          evolucoesFiltradas = [...todasEvolucoes];
          renderizarTimeline();
          
          // Mostrar atalhos se houver paciente
          const urlParams = new URLSearchParams(window.location.search);
          pacienteSelecionado = urlParams.get('paciente');
          if (pacienteSelecionado) {
            document.getElementById('filter-paciente').value = pacienteSelecionado;
            carregarAtalhosPorPaciente(pacienteSelecionado);
          }
        } else {
          mostrarFeedback('error', '❌ Erro: ' + res.mensagem);
        }
      } catch (err) {
        mostrarFeedback('error', '❌ Erro ao carregar evoluções');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    // ── Caregar atalhos por paciente ──────────────────────────────────
    async function carregarAtalhosPorPaciente(paciente) {
      if (!paciente) return;

      try {
        const res1 = await chamarBackend({
          action: 'obterPrimeiraEvolucao',
          paciente: paciente
        });
        const res2 = await chamarBackend({
          action: 'obterUltimaEvolucao',
          paciente: paciente
        });

        if (res1.sucesso) {
          document.getElementById('primeira-data').textContent = 
            res1.evolucao.dataHora.split(' ')[0];
          document.getElementById('btn-primeira').disabled = false;
        } else {
          document.getElementById('btn-primeira').disabled = true;
        }

        if (res2.sucesso) {
          document.getElementById('ultima-data').textContent = 
            res2.evolucao.dataHora.split(' ')[0];
          document.getElementById('btn-ultima').disabled = false;
        } else {
          document.getElementById('btn-ultima').disabled = true;
        }

        document.getElementById('shortcuts-section').style.display = 'block';
      } catch (err) {
        console.error('Erro ao carregar atalhos:', err);
      }
    }

    // ── Renderizar timeline ───────────────────────────────────────────
    function renderizarTimeline() {
      const timeline = document.getElementById('timeline');
      const resultsHeader = document.getElementById('results-header');
      const emptyState = document.getElementById('empty-state');
      const totalEl = document.getElementById('total-evolutions');

      timeline.innerHTML = '';

      if (evolucoesFiltradas.length === 0) {
        resultsHeader.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      resultsHeader.style.display = 'flex';
      emptyState.style.display = 'none';
      totalEl.textContent = evolucoesFiltradas.length;

      evolucoesFiltradas.forEach(ev => {
        const item = document.createElement('div');
        item.className = 'timeline-item';

        const dataFormatada = new Date(ev.dataHora).toLocaleDateString('pt-BR');
        const horaFormatada = new Date(ev.dataHora).toLocaleTimeString('pt-BR', { 
          hour: '2-digit', 
          minute: '2-digit' 
        });

        item.innerHTML = `
          <div class="timeline-header">
            <div class="timeline-meta">
              <div class="timeline-date">${dataFormatada} às ${horaFormatada}</div>
              <div class="timeline-paciente">${ev.paciente}</div>
            </div>
            <div class="timeline-badge">✓ ${ev.status}</div>
          </div>

          <div class="timeline-body">
            <div class="timeline-row">
              <div class="timeline-field">
                <div class="timeline-label">COREN</div>
                <div class="timeline-value">${ev.coren}</div>
              </div>
              <div class="timeline-field">
                <div class="timeline-label">Profissional</div>
                <div class="timeline-value">${ev.profissional}</div>
              </div>
            </div>

            <div class="timeline-row">
              <div class="timeline-field">
                <div class="timeline-label">Procedimentos</div>
                <div class="timeline-value">${ev.procedimentos || '-'}</div>
              </div>
            </div>

            <div class="timeline-row">
              <div class="timeline-field">
                <div class="timeline-label">Observações</div>
                <div class="timeline-value">${ev.observacoes || '-'}</div>
              </div>
            </div>
          </div>

          <div class="timeline-footer">
            ${ev.linkPdf 
              ? `<a href="${ev.linkPdf}" target="_blank" rel="noopener" class="btn-view-pdf">📄 Ver PDF</a>`
              : `<button class="btn-view-pdf" disabled>📄 Sem PDF</button>`
            }
          </div>
        `;

        timeline.appendChild(item);
      });
    }

    // ── Aplicar filtros ───────────────────────────────────────────────
    function aplicarFiltros() {
      const paciente = document.getElementById('filter-paciente').value.toLowerCase().trim();
      const coren = document.getElementById('filter-coren').value.toUpperCase().trim();
      const data = document.getElementById('filter-data').value;

      evolucoesFiltradas = todasEvolucoes.filter(ev => {
        const atendePaciente = !paciente || 
          ev.paciente.toLowerCase().includes(paciente);
        
        const atendeCoren = !coren || 
          ev.coren.toUpperCase().includes(coren);
        
        const atendData = !data || 
          ev.dataHora.startsWith(data);

        return atendePaciente && atendeCoren && atendData;
      });

      if (evolucoesFiltradas.length === 0) {
        mostrarFeedback('info', 'ℹ️ Nenhuma evolução encontrada com estes critérios');
      }

      // Se filtrou por paciente, carregar atalhos
      if (paciente && evolucoesFiltradas.length > 0) {
        carregarAtalhosPorPaciente(evolucoesFiltradas[0].paciente);
      }

      renderizarTimeline();
    }

    // ── Limpar filtros ───────────────────────────────────────────────
    function limparFiltros() {
      document.getElementById('filter-paciente').value = '';
      document.getElementById('filter-coren').value = '';
      document.getElementById('filter-data').value = '';
      document.getElementById('shortcuts-section').style.display = 'none';
      evolucoesFiltradas = [...todasEvolucoes];
      renderizarTimeline();
      mostrarFeedback('info', 'Filtros limpos');
    }

    // ── Atalho: Primeira evolução ────────────────────────────────────
    async function ir_primeira() {
      const paciente = document.getElementById('filter-paciente').value.trim();
      if (!paciente) {
        mostrarFeedback('error', 'Selecione um paciente');
        return;
      }

      try {
        const res = await chamarBackend({
          action: 'obterPrimeiraEvolucao',
          paciente: paciente
        });

        if (res.sucesso && res.evolucao.linkPdf) {
          window.open(res.evolucao.linkPdf, '_blank');
        } else {
          mostrarFeedback('error', 'Nenhuma evolução encontrada');
        }
      } catch (err) {
        mostrarFeedback('error', 'Erro ao carregar primeira evolução');
      }
    }

    // ── Atalho: Última evolução ──────────────────────────────────────
    async function ir_ultima() {
      const paciente = document.getElementById('filter-paciente').value.trim();
      if (!paciente) {
        mostrarFeedback('error', 'Selecione um paciente');
        return;
      }

      try {
        const res = await chamarBackend({
          action: 'obterUltimaEvolucao',
          paciente: paciente
        });

        if (res.sucesso && res.evolucao.linkPdf) {
          window.open(res.evolucao.linkPdf, '_blank');
        } else {
          mostrarFeedback('error', 'Nenhuma evolução encontrada');
        }
      } catch (err) {
        mostrarFeedback('error', 'Erro ao carregar última evolução');
      }
    }

    // ── Mostrar feedback ──────────────────────────────────────────────
    function mostrarFeedback(tipo, msg) {
      const el = document.getElementById('feedback');
      el.textContent = msg;
      el.className = 'feedback show ' + tipo;
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      setTimeout(() => {
        el.classList.remove('show');
      }, 5000);
    }

    // ── Inicializar ───────────────────────────────────────────────────
    window.addEventListener('load', carregarEvolucoes);
  </script>

</body>
</html>
